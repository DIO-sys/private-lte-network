version: '3'
services:
  influxdb:
    image: influxdb:2.0
    container_name: lte_influxdb
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=ltepassword
      - DOCKER_INFLUXDB_INIT_ORG=lte-network
      - DOCKER_INFLUXDB_INIT_BUCKET=srsran
      - DOCKER_INFLUXDB_INIT_RETENTION=0

  grafana:
    image: grafana/grafana:latest
    container_name: lte_grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ~/lte-dashboard/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ltepassword
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  influxdb-data:
  grafana-data:
